# Pipeline Configuration
# =====================
# Configure app IDs, scraping parameters, and LLM settings here.

scraper:
  apple:
    # SOURCE APP 1: Apple App Store app ID (numeric ID from the App Store URL)
    # Example: https://apps.apple.com/us/app/example/id123456789 → app_id: "123456789"
    app_id: 1404871703
    country: "in"
    rss_limit: 500           # max reviews per RSS fetch (Apple caps at 500)

  google:
    # SOURCE APP 2: Google Play package name
    # Example: https://play.google.com/store/apps/details?id=com.example.app
    app_id: "com.nextbillion.groww"
    language: "en"
    count: 500               # max reviews to fetch

  lookback_weeks: 12         # fetch reviews from last N weeks
  min_lookback_weeks: 8      # minimum window (for validation)

  rate_limit:
    requests_per_minute: 10
    retry_max: 3
    retry_backoff_seconds: 5

  request_timeout_seconds: 30

llm:
  provider: "groq"
  model: "llama-3.3-70b-versatile"
  fallback_model: "llama-3.3-70b-versatile"
  max_retries: 3

email:
  dry_run: false              # set to false to actually send emails/append doc
  to_address: "saurabhdeosarkar101@gmail.com"     # TARGET 1: recipient Gmail address for draft creation
  doc_id: "1cN87QOCrQfFcAmZvj0dzvM_eoPFFCxVKDloS2UVphSY"          # TARGET 2: Google Doc ID to append weekly note
  # FROM email is NOT set here. It comes from the Gmail account authorized on the MCP server
  # via credentials.json + token.json during server setup/deployment.
